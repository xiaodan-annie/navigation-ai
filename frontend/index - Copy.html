<!DOCTYPE html>
<html>
<head>
    <title>Navigation AI</title>

    <!-- Leaflet CSS -->
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet/dist/leaflet.css"
    />

    <style>
        #map {
            height: 400px;
            margin-top: 20px;
            border-radius: 10px;
        }
    </style>
</head>

<body>
<h2>AI Navigation Dashboard</h2>

<input id="origin" placeholder="Origin">
<input id="destination" placeholder="Destination">

<button onclick="analyze()">Analyze Route</button>

<div style="
    display:flex;
    gap:20px;
    margin-top:20px;
">

    <!-- MAP -->
    <div style="flex:2;">
        <div id="map"></div>
    </div>

    <!-- DIRECTIONS PANEL -->
    <div style="
        flex:1;
        max-height:400px;
        overflow-y:auto;
        border:1px solid #ccc;
        padding:10px;
        border-radius:10px;
    ">
        <h3>Turn-by-Turn Directions</h3>

        <div id="directions"></div>
    </div>

</div>

<!-- TEXT OUTPUT -->
<div id="output" style="margin-top:20px;"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- Polyline decoder -->
<script src="https://unpkg.com/@mapbox/polyline"></script>

<!-- Your app -->
<script src="app.js"></script>

</body>
</html>
